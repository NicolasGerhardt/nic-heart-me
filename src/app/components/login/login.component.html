<h1 class="jumbotron">Login Page</h1>
<div class="container">
<div *ngIf="auth.user$ | async as user; else login">
  <pre>
    {{ user | json }}
  </pre>
  <div *ngIf="user.admin">
    <a class="btn btn-primary btn-lg btn-block" href="blog-edit">Edit Blog</a>
  </div>
  <button class="btn btn-primary btn-lg btn-block" (click)="auth.signOut()">Sign out</button>
</div>
</div>
<ng-template #login>
  <button class="btn btn-primary btn-lg btn-block" (click)="auth.googleSignin()">Sign in</button>
</ng-template>
